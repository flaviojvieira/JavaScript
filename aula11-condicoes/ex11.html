<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de País</title>
</head>
<body>
    <h1>Qual País que Você Mora?</h1>
    <input type="text" name="txp" id="txp">
    <input type="button" value="consultar" onclick="consultar()">
    <div id="res"></div>

    <script>
        function consultar() {
            var pais = document.getElementById('txp').value
            var res = document.getElementById('res')    
            res.innerHTML = ' <br> Você nasceu no ' + pais + '<br><br>'     
           
            if (pais == 'Brasil') {
                res.innerHTML += `Você é Brasileiro!`
            } 

            if (pais != 'Brasil'){
                res.innerHTML += 'Você é estrangeiro!'
            }                        
        }
    </script>
</body>
</html>
