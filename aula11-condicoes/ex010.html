<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições - if else</title>
</head>
<body>
    <h1>Sistema de Multas - DETRAN</h1>
    Velocidade do carro <input type="number" name="txtvel" id="txtvel"> km/h
    <input type="button" value="consultar" onclick="consultar()">
    <div id="res"></div>

    <script>
        function consultar() {
            var txtv = document.getElementById('txtvel')
            var vel = Number(txtv.value)
            var res = document.getElementById('res')
            res.innerHTML = `<p>Sua velocidade é de ${vel}km/h</p>`
            if (vel > 60) {
                res.innerHTML += `<p>Você foi <strong>MULTADO</strong</p>`
            }
            res.innerHTML += `<p>Digija sempre com cuidado!</p>`
        }
        
        
     
        
    </script>
</body>
</html>
