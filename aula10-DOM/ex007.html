<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculando</title>
    <style>
        body {
            font: normal 18pt Arial;
        }

        input {
            font: normal 18pt arial;
            width: 130px;
        }

        div#res {            
            margin-top: 10px;
            width: 400px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Calculando Valores</h1>
    <input type="number" name="txtn1" id="txtn1">
    <input type="number" name="txtn2" id="txtn2">
    <input type="button" value="calcular" onclick="calcular()"> 
    <div id="res"></div>

    <script> 
        function calcular(){
            var tn1 = window.document.getElementById('txtn1')
            var tn2 = window.document.querySelector('input#txtn2')
            var res = window.document.getElementById('res')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var soma = n1 + n2
            var sub = n1 - n2
            var div = n1 / n2
            var mult = n1 * n2
            res.style.background = 'cadetblue'
            res.innerHTML = `Soma: <strong>${soma}</strong> <br> Subtração: <strong>${sub}</strong> <br> Divisão: <strong>${div}</strong> <br> Multiplicação: <strong>${mult}</strong>`
            
        }
    </script>
</body>
</html>
