<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area {
            font: normal 20pt arial;
            background: green;
            color: white;
            width: 200px;
            height: 200px;
            margin: auto;
            line-height: 200px;
            text-align: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="area">
        interaja...
    </div>

    <script>
        var a = document.getElementById('area')
        a.addEventListener('mouseenter', entrou)
        a.addEventListener('mouseout', sair)
        a.addEventListener('click', clicar)

        function entrou() {
            a.innerText = 'Mouse entrou'
        }

        function sair() {
            a.innerText = 'Mouse saiu'
        }

        function clicar() {
            a.innerText = 'Clicou'
        }
    </script>

</body>
</html>
