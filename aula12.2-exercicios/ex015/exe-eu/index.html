<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exe - Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>

    <main>
        <div>
            <p>Ano de Nascimento
                <input type="number" name="txtano" id="txtano">
            </p>
            <p>Sexo:
                <input type="radio" name="txtsex" id="mas" checked>
                <label for="masc">Masculino</label>
                <input type="radio" name="txtsex" id="fem">
                <label for="fem">Feminino</label>                
            </p>
            <p>
                <input id="botao" type="submit" value="verificar" onclick="verificar()">
            </p>
        </div>
            
        <div id="res">
            <p style="text-align: center;">Preenche os dados para ver o resultado!</p>
        </div>
    </main>

    <footer>
        <p>&copy Flávio Vieira</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
